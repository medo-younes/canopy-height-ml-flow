project:
  name: canopy-height-ml-flow
  datasource: canelevation
  # aoi_name: "Wood Buffalo National Park of Canada"
  aoi_name: "Jasper National Park of Canada"
  s3_bucket: canopy-flow-data
  s3_prefix: ${project.s3_bucket}/${project.aoi_name}
  seed: 420
  run_models: ['ElasticNet', 'RandomForestRegressor', 'XGBRegressor']
  criterion: "RMSE"

# Data processing parameters
data:
  res_m: 10
  chm:
    statistic: P95
  sampling: 
    id: "id"
    n: 5000
    k: 5
    min_n_per_tile: 20
    width: 10_000
    height: 10_000
    method: random
    orientation: tb-lr
    grid_type: rect
    random_state: ${project.seed}
    n_per_strata: 5
    height_strata: [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50]
    strata_names:  ["0-5", '5-10','10-15', '15-20','20-25','25-30' ,'30-35', '35-40', '40-45', '45-50', '>50']
    min_area: 1000
  filter:
    min_height: 0
    max_height: 50
    min_forest_cover: 0.25
  get_aoi:
    name_col: DESC_EN
    aoi_name: ${project.aoi_name}



# File paths organization
paths:
  data: ${paths.project.root}/data
  sites: sites.parquet
  tile_index: tile_index.parquet

  project:
    root: projects/${project.aoi_name}
    aoi: ${paths.project.root}/aoi.parquet
    tiles_aoi: ${paths.project.root}/tiles_aoi.parquet
    tiles_aoi_bounds: ${paths.project.root}/tiles_aoi_bounds.parquet
    forest_mask: ${paths.project.root}/forest.tif
    water_bodies: ${paths.project.root}/water.parquet
    blocks: ${paths.project.root}/blocks.parquet
  ## Raw Data Inputs
  raw:
    laz: ${paths.data}/laz
    embeddings: ${paths.data}/embedding_images
  # Processed intermediate data (regenerable)
  prc:
    chm:  ${paths.data}/chm
    stratified: ${paths.data}/chm_stratified
  training:
    ch_samples: canopy_heights
    embedding_samples: embeddings
    sample_points_path: sample_points.parquet
    
  experiments:
    root: ${paths.project.root}/experiments
    dataset: dataset.parquet

  # Runtime artifacts (run-specific, ephemeral)
  predictions:
    root: ${paths.project.root}/predictions
  



    
aws:
  canelevation:
    region: 'ca-central-1'
    s3_bucket: s3://canelevation-lidar-point-clouds/
    s3_directory: pointclouds_nuagespoints/NRCAN


## Regression Models
models:
  ElasticNet:
    __target__: sklearn.linear_model.ElasticNet
    max_iter: 10000
    random_state: ${project.seed}
  RandomForestRegressor:
    __target__: sklearn.ensemble.RandomForestRegressor
    random_state: ${project.seed}
  XGBRegressor:
    __target__: xgboost.XGBRegressor
    random_state: ${project.seed}
    n_jobs: ${experiment.n_jobs}

experiment:
  criterion: "RMSE"
  scoring: "neg_root_mean_squared_error"
  n_trials: 30
  n_jobs: -1
  verbose: 1
  

parameters:
  ElasticNet:
    alpha:
      __target__: optuna.distributions.FloatDistribution
      low: 1e-5
      high: 10.0
      log: true
    l1_ratio:
      __target__: optuna.distributions.FloatDistribution
      low: 0.0
      high: 1.0
      log: false
  RandomForestRegressor:
    n_estimators:
      __target__: optuna.distributions.IntDistribution
      low: 50
      high: 500
      log: true
    max_depth:
      __target__: optuna.distributions.IntDistribution
      low: 5
      high: 50
      log: true
    min_samples_split:
      __target__: optuna.distributions.IntDistribution
      low: 2
      high: 20
      log: false
    min_samples_leaf:
      __target__: optuna.distributions.IntDistribution
      low: 1
      high: 10
      log: false
    max_features:
      __target__: optuna.distributions.CategoricalDistribution
      choices: ["sqrt", "log2", 0.5]

  XGBRegressor:
    n_estimators:
      __target__: optuna.distributions.IntDistribution
      low: 10
      high: 500
      log: true
    learning_rate:
      __target__: optuna.distributions.FloatDistribution
      low: 1e-4
      high: 0.3
      log: true
    max_depth:
      __target__: optuna.distributions.IntDistribution
      low: 3
      high: 50
      log: true
    subsample:
      __target__: optuna.distributions.FloatDistribution
      low: 0.5
      high: 1.0
      log: false
    colsample_bytree:
      __target__: optuna.distributions.FloatDistribution
      low: 0.5
      high: 1.0
      log: false
    gamma:
      __target__: optuna.distributions.FloatDistribution
      low: 0.0
      high: 5.0
      log: false


predict:
  tile_size: 2_500 #2 km